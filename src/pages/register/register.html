<section class="register-section">
    <div class="register-card">
        <h2>¡Crea tu perfil!</h2> 
        <p class="subtitle">Únete y empieza a sumar acciones por el planeta.</p>
        
        <form id="register_form">
            <div class="form-group">
                <label for="reg_name">Nombre:</label>
                <input type="text" id="reg_name" required placeholder="¿Cómo te llamamos?">
            </div>
            <div class="form-group">
                <label for="reg_email">Correo Electrónico:</label>
                <input type="email" id="reg_email" required placeholder="tuCorreo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="reg_pass">Contraseña:</label>
                <input type="password" id="reg_pass" required placeholder="Crea una contraseña segura">
            </div>
            <button type="submit" id="reg_btn" class="btn-primary">Enviar</button>
        </form>
    </div>
</section>
