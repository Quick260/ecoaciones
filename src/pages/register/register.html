<section class="register-container">
    <!--Bandamax, si algo no les late, quitenlo con confianza xdddddddd.

    <h2>¡Crea tu perfil de EcoAcciones!</h2> 
    <form id="register_form">
        <div class="form-group">
            <label for="reg_name">Nombre:</label>
            <input type="text" id="reg_name" required placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label for="reg_email">Correo Electronico:</label>
            <input type="text" id="reg_email" required placeholder="tuCorreo@ejemplo.com">
        </div>
        <div class="form-group">
            <label for="reg_pass">Contraseña:</label>
            <input type="text" id="reg_pass" required>
        </div>
        <button type="submit" id="reg_btn">Registrarse</button>

    </form>
</section>
