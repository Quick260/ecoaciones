<section class="register-section">
    <div class="register-card">
        <h2>Inicia sesión</h2>
        <p class="subtitle">Entra a tu perfil para continuar con tus ecoacciones.</p>

        <form id="login_form">
            <div class="form-group">
                <label for="login_email">Correo Electrónico:</label>
                <input type="email" id="login_email" required placeholder="tuCorreo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="login_pass">Contraseña:</label>
                <input type="password" id="login_pass" required placeholder="Ingresa tu contraseña">
            </div>
            <button type="submit" id="login_btn" class="btn-primary">Entrar</button>
        </form>
    </div>
</section>
