<section class="tracking-container">
    <div class="tracking-header">
        <h1 class="page-title">Tu Impacto Ambiental</h1>
        <p class="page-subtitle">Marca las acciones que has completado y suma puntos para el planeta.</p>
    </div>

    <div class="tracking-summary">
        <div>
            <span class="summary-label">Fecha activa</span>
            <strong id="activeDate">--</strong>
        </div>
        <div>
            <span class="summary-label">Puntos acumulados</span>
            <strong id="totalPoints">0 pts</strong>
        </div>
    </div>

    <div id="adminDateControls" class="admin-date-controls"></div>

    <div class="kanban-board">
        <div class="kanban-column">
            <div class="column-header daily-header">
                <h3>☀️ Diarias</h3>
            </div>
            <ul id="dailyList" class="kanban-list"></ul>
        </div>

        <div class="kanban-column">
            <div class="column-header weekly-header">
                <h3>📅 Semanales</h3>
            </div>
            <ul id="weeklyList" class="kanban-list"></ul>
        </div>

        <div class="kanban-column">
            <div class="column-header monthly-header">
                <h3>🌙 Mensuales</h3>
            </div>
            <ul id="monthlyList" class="kanban-list"></ul>
        </div>
    </div>
</section>
